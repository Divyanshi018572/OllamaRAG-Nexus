services:
  - type: web
    name: nexu-rag-nexus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard for security
    autoDeploy: true
